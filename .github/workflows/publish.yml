name: publish

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  publish-release:
    runs-on: ubuntu-latest
    name: publish-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java + Maven + GPG
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: 'temurin'
          cache: maven

          # Maven Central credentials
          server-id: central
          server-username: CP_USERNAME
          server-password: CP_PASSWORD

          # GPG config (THIS replaces Travis setupSigning.sh)
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Set version from tag
        run: |
          mvn -B versions:set \
            -DnewVersion=${{ github.ref_name }} \
            -DgenerateBackupPoms=false

      - name: Publish Javadocs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO_SLUG: ${{ github.repository }}
          GH_TAG: ${{ github.ref_name }}
        run: |
          mvn -B clean javadoc:aggregate
          build/publishJavadoc-gha.sh

      - name: Deploy to Maven Central
        env:
          CP_USERNAME: ${{ secrets.CP_USERNAME }}
          CP_PASSWORD: ${{ secrets.CP_PASSWORD }}
        run: |
          mvn -B deploy -DskipTests -P central
